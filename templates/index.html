<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insurance Cost Predictor</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(to right, #4facfe, #00f2fe);
            min-height: 100vh;
        }
        .card{
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 400px;">

        <h3 class="text-center mb-4">💊 Insurance Cost Predictor</h3>

        <form action="/predict" method="post">

            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" name="age" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Sex</label>
                <select name="sex" class="form-select">
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">BMI</label>
                <input type="number" step="0.1" name="bmi" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Children</label>
                <input type="number" name="children" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Smoker</label>
                <select name="smoker" class="form-select">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Region</label>
                <select name="region" class="form-select">
                    <option value="0">Southeast</option>
                    <option value="1">Southwest</option>
                    <option value="2">Northwest</option>
                    <option value="3">Northeast</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">Predict Cost</button>

        </form>

        {% if prediction_text %}
        <div class="alert alert-success text-center mt-4">
            {{ prediction_text }}
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
